<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>울산 E-Card</title>
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/animations.css">
</head>
<body>
  <div id="app">

    <!-- 헤더 -->
    <header id="header">
      <p class="subtitle">Ulsan Tourism E-Card</p>
      <h1>울산의 빛을 담아드립니다</h1>
      <p class="desc">방문 소감을 적으면 당신만의 색채로 물드는 울산 12경</p>
    </header>

    <!-- SVG 이미지 영역 -->
    <section id="svg-section">
      <div id="svg-container" class="blurred">
        <!-- svg-renderer.js가 stained-glass.svg를 인라인으로 삽입 -->
      </div>
      <div id="blur-hint">
        <span>✦</span>
        <p>소감을 입력하면<br>울산의 색이 깨어납니다</p>
      </div>
      <div id="loading-overlay" class="hidden">
        <div class="spinner"></div>
      </div>
      <p id="active-spot-label" class="hidden"></p>
    </section>

    <!-- 컬러 팔레트 스트립 -->
    <div id="palette-strip" class="hidden"></div>

    <!-- 소감 입력 영역 -->
    <section id="input-section">
      <div class="input-card">
        <label>방문 소감</label>
        <textarea id="impression-text"
          placeholder="울산에서 느낀 것들을 자유롭게 적어주세요..."
          rows="4"></textarea>
        <div class="input-footer">
          <span id="char-count">0 · Ctrl+Enter로 전송</span>
          <div class="btn-group">
            <button id="reset-btn" class="btn-secondary hidden">다시 쓰기</button>
            <button id="submit-btn" class="btn-primary" disabled>색채 입히기</button>
          </div>
        </div>
      </div>
      <p id="error-msg" class="error hidden"></p>
    </section>

    <!-- 결과 영역 -->
    <section id="result-section" class="hidden">
      <div class="divider"><span>✦</span></div>

      <!-- 감성 키워드 -->
      <div id="keyword-chips"></div>

      <!-- 답글 카드 -->
      <div id="reply-card">
        <p id="primary-emotion"></p>
        <h2 id="reply-main"></h2>
        <div class="divider-line"></div>
        <p id="reply-place"></p>
        <p id="reply-tagline"></p>
      </div>

      <!-- 감성 스펙트럼 -->
      <div id="emotion-spectrum">
        <p class="spectrum-title">감성 스펙트럼</p>
        <div id="spectrum-bars"></div>
      </div>

      <!-- 액션 버튼 -->
      <div id="action-buttons">
        <button id="save-btn" class="btn-secondary">이미지로 저장</button>
        <button id="share-btn" class="btn-secondary">공유하기</button>
      </div>
    </section>

  </div>

  <script type="module" src="/js/app.js"></script>
</body>
</html>
